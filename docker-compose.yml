version: '3.8'

services:
  # ── Backend (Express + Prisma → Neon) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (Next.js standalone) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:5000
    ports:
      - '3000:3000'
    environment:
      API_URL: http://backend:5000
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
